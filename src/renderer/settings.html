<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'self'; script-src 'self'; img-src data:; connect-src 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Musicarr Settings</title>
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <main class="shell">
    <header class="head">
      <div class="logo" aria-hidden="true">
        <svg viewBox="0 0 32 32" width="28" height="28">
          <rect width="32" height="32" rx="7" fill="#c9f24d"/>
          <rect x="13" y="8.5" width="6" height="15" rx="1.5" fill="#11140a"/>
        </svg>
      </div>
      <h1>Settings</h1>
    </header>

    <section class="group">
      <h2>Startup</h2>

      <label class="row" for="launchAtLogin">
        <span class="text">
          <span class="title">Launch Musicarr at login</span>
          <span class="desc">Open the app automatically when you sign in to your computer.</span>
        </span>
        <span class="switch">
          <input type="checkbox" id="launchAtLogin" />
          <span class="track" aria-hidden="true"></span>
        </span>
      </label>

      <label class="row" for="startMinimized">
        <span class="text">
          <span class="title">Start hidden in the tray</span>
          <span class="desc">When launched at login, start in the tray instead of opening the window.</span>
        </span>
        <span class="switch">
          <input type="checkbox" id="startMinimized" />
          <span class="track" aria-hidden="true"></span>
        </span>
      </label>
    </section>

    <section class="group">
      <h2>Window</h2>

      <label class="row" for="minimizeToTray">
        <span class="text">
          <span class="title">Keep running in the tray when closed</span>
          <span class="desc">Closing the window hides Musicarr to the tray instead of quitting.</span>
        </span>
        <span class="switch">
          <input type="checkbox" id="minimizeToTray" />
          <span class="track" aria-hidden="true"></span>
        </span>
      </label>
    </section>

    <p id="status" class="status" role="status"></p>
  </main>

  <script src="settings.js"></script>
</body>
</html>

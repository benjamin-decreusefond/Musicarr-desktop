<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'self'; script-src 'self'; img-src data:;" />
  <title>Musicarr</title>
  <link rel="stylesheet" href="titlebar.css" />
</head>
<body>
  <div class="bar">
    <div class="brand">
      <svg viewBox="0 0 32 32" width="18" height="18" aria-hidden="true">
        <rect width="32" height="32" rx="7" fill="#c9f24d"/>
        <rect x="13" y="8.5" width="6" height="15" rx="1.5" fill="#11140a"/>
      </svg>
      <span>Musicarr</span>
    </div>

    <div class="drag" id="drag"></div>

    <div class="right">
      <button id="switch" class="pill hidden" title="Switch server (Ctrl+Shift+S)">
        <svg viewBox="0 0 24 24" width="13" height="13" aria-hidden="true">
          <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                d="M4 9h13l-3.5-3.5M20 15H7l3.5 3.5"/>
        </svg>
        <span id="host"></span>
      </button>

      <div class="winctl">
        <button id="min" class="wb" aria-label="Minimize" title="Minimize">
          <svg viewBox="0 0 12 12" width="11" height="11"><path d="M2 6h8" stroke="currentColor" stroke-width="1.2"/></svg>
        </button>
        <button id="max" class="wb" aria-label="Maximize" title="Maximize">
          <svg id="maxIcon" viewBox="0 0 12 12" width="11" height="11">
            <rect x="2.5" y="2.5" width="7" height="7" fill="none" stroke="currentColor" stroke-width="1.2"/>
          </svg>
        </button>
        <button id="close" class="wb close" aria-label="Close" title="Close">
          <svg viewBox="0 0 12 12" width="11" height="11"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="1.2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script src="titlebar.js"></script>
</body>
</html>
